# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# open-paws-corporate-watch — Company commitment tracker and supply chain monitor.
# Scrapling + Next.js. Data must be sourced from public records only.
language: en-US
tone_instructions: "Direct and concise. Flag actionable issues only."

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  estimate_code_review_effort: true
  suggested_labels: true
  auto_apply_labels: false

  labeling_instructions:
    - label: "breaking-change"
      instructions: "Apply when changes modify the scoring methodology, data schema, or public-facing company profiles."

  path_filters:
    - "!dist/**"
    - "!.next/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!.claude/worktrees/**"

  path_instructions:
    - path: "src/**"
      instructions: |
        Company commitment data must be sourced from verifiable public records only — press releases, SEC filings, official policy documents.
        Scraped data must not be stored beyond the retention policy — process and derive metrics, discard raw HTML.
        Commitment-tracking scoring must be documented and reproducible from code alone.
        No personal data about individual employees — focus on corporate policies and public statements only.
        Supply chain monitoring: verify data sources are public and citations are stored with retrieval dates.
    - path: "src/components/**"
      instructions: |
        Verify dark and light mode — no hardcoded colors without CSS variable fallback.
        WCAG AA contrast (4.5:1 normal text). ARIA labels on all interactive elements.
    - path: "**/*.test.{ts,js,tsx,py}"
      instructions: "Every test must fail if covered behavior breaks. No snapshot tests. No live scraping in tests — use recorded fixtures."

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: ["WIP", "DO NOT MERGE"]
    drafts: false
    base_branches: ["main"]
    ignore_usernames: ["dependabot[bot]", "renovate[bot]"]

  pre_merge_checks:
    custom_checks:
      - name: "No hardcoded secrets or credentials"
        mode: "error"
        instructions: "Fail if non-test files contain hardcoded API keys, tokens, passwords, or credentials."
      - name: "No speciesist idioms"
        mode: "error"
        instructions: "Fail on: 'livestock', 'master/slave', 'whitelist/blacklist', 'cattle vs pets', 'kill two birds', 'guinea pig' as test subject, 'farm' as industry euphemism."

  finishing_touches:
    unit_tests:
      enabled: true
    custom:
      - name: "fix NAV violations"
        instructions: "Replace speciesist idioms. 'livestock'→'farmed animals', 'master/slave'→'primary/replica', 'whitelist/blacklist'→'allowlist/denylist'. Full list: https://github.com/Open-Paws/no-animal-violence"

  tools:
    semgrep:
      enabled: true
      config_file: "semgrep-no-animal-violence.yaml"
    betterleaks:
      enabled: true
    trufflehog:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      level: "default"

chat:
  auto_reply: true
  art: false

knowledge_base:
  opt_out: false
  web_search:
    enabled: false
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  jira:
    usage: "disabled"
  linear:
    usage: "disabled"
  mcp:
    usage: "disabled"

code_generation:
  unit_tests:
    path_instructions:
      - path: "src/**"
        instructions: "Every test must fail if covered behavior breaks. No snapshot tests. No live scraping in tests. Use recorded HTML fixtures."
